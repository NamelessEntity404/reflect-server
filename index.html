  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const video = document.createElement('video');
    video.src         = './_videos/scroll_optimized/web__future scifi spaceship _RENDER_THIS_1.mp4';
    video.muted       = true;
    video.playsInline = true;
    video.preload     = 'auto';
    // muted autoplay is allowed by all browsers — no click needed
    video.play().then(() => video.pause()).catch(() => {});

    let targetTime = 0;
    let currentDisplayTime = 0;

    function draw() {
      requestAnimationFrame(draw);
      if (video.readyState < 2) return;

      const diff = targetTime - currentDisplayTime;
      if (Math.abs(diff) > 0.001) {
        currentDisplayTime += diff * 0.3;
        video.currentTime = currentDisplayTime;
      }

      const vw = video.videoWidth, vh = video.videoHeight;
      const scale = Math.min(canvas.width / vw, canvas.height / vh);
      const dw = vw * scale, dh = vh * scale;
      const dx = (canvas.width - dw) / 2, dy = (canvas.height - dh) / 2;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, dx, dy, dw, dh);
    }
    draw();

    const buyBtn = document.getElementById('buy-btn');
    const scrollHint = document.getElementById('scroll-hint');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 40) scrollHint.classList.add('hidden');
      if (!video.duration) return;
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
      targetTime = pct * (video.duration || 0);
      if (video.fastSeek) video.fastSeek(targetTime);

      // show buy button when video is between 9s and 13s
      if (video.currentTime >= 9 && video.currentTime <= 13) {
        buyBtn.classList.add('visible');
      } else {
        buyBtn.classList.remove('visible');
      }
    }, { passive: true });
  </script>
