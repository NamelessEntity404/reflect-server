  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const video = document.createElement('video');
    video.src         = './_videos/web__round holograph-Final Comp.mp4';
    video.muted       = true;
    video.playsInline = true;
    video.preload     = 'auto';
    video.play().then(() => video.pause()).catch(() => {});

    function draw() {
      requestAnimationFrame(draw);
      if (video.readyState < 2) return;
      const vw = video.videoWidth, vh = video.videoHeight;
      const scale = Math.min(canvas.width / vw, canvas.height / vh);
      const dw = vw * scale, dh = vh * scale;
      const dx = (canvas.width - dw) / 2, dy = (canvas.height - dh) / 2;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(video, dx, dy, dw, dh);
    }
    draw();

    const buyBtn = document.getElementById('buy-btn');
    const scrollHint = document.getElementById('scroll-hint');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 40) scrollHint.classList.add('hidden');
      if (!video.duration) return;
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
      video.currentTime = pct * video.duration;

      if (video.currentTime >= 9 && video.currentTime <= 13) {
        buyBtn.classList.add('visible');
      } else {
        buyBtn.classList.remove('visible');
      }
    }, { passive: true });
  </script>

  <div id="nav-tab"></div>
  <script>
    const nav = document.querySelector('nav');
    const tab = document.getElementById('nav-tab');
    let navVisible = false;
    let touchStartY = 0;
    let mouseStartY = 0;

    // hide immediately on load
    nav.style.transform = 'translateX(-50%) translateY(-200px)';
    nav.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';

    function showNav() {
      navVisible = true;
      nav.style.transform = 'translateX(-50%) translateY(20px)';
    }
    function hideNav() {
      navVisible = false;
      nav.style.transform = 'translateX(-50%) translateY(-200px)';
    }

    tab.addEventListener('click', () => navVisible ? hideNav() : showNav());

    window.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchend', e => {
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (dy > 40 && touchStartY < 80) showNav();
      if (dy < -40) hideNav();
    }, { passive: true });

    window.addEventListener('mousedown', e => { mouseStartY = e.clientY; });
    window.addEventListener('mouseup', e => {
      const dy = e.clientY - mouseStartY;
      if (dy > 40 && mouseStartY < 80) showNav();
      if (dy < -40) hideNav();
    });
  </script>
